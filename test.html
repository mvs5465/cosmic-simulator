<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Simulator - Test Suite</title>
    <style>
        body {
            background: #0a0e27;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #7c3aed;
            margin-top: 0;
        }

        #test-output {
            background: #1a1f3a;
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 20px;
            white-space: pre-wrap;
            overflow-y: auto;
            max-height: 80vh;
            font-size: 12px;
            line-height: 1.5;
        }

        .pass {
            color: #4ade80;
        }

        .fail {
            color: #f87171;
        }

        .summary {
            margin-top: 20px;
            padding: 15px;
            background: #1e293b;
            border-radius: 4px;
            border-left: 3px solid #7c3aed;
        }
    </style>
</head>
<body>
    <h1>🧪 Cosmic Simulator Test Suite</h1>
    <div id="test-output">Loading tests...</div>

    <script src="sim-core.js"></script>
    <script src="sim.js"></script>
    <script src="test.js"></script>
</body>
</html>
