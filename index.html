<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Simulator</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            height: 100vh;
        }

        #canvas {
            flex: 1;
            background: #0a0e27;
            cursor: crosshair;
        }

        .sidebar {
            width: 250px;
            background: #0f1229;
            border-left: 1px solid #1a1f3a;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-title {
            font-size: 12px;
            color: #7c3aed;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        button {
            padding: 8px 12px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 12px;
            border-radius: 4px;
            transition: all 0.2s;
            font-family: 'Courier New', monospace;
        }

        button:hover {
            background: #334155;
            border-color: #7c3aed;
            color: #7c3aed;
        }

        button.active {
            background: #7c3aed;
            border-color: #7c3aed;
            color: #fff;
        }

        select {
            padding: 8px 12px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        select:hover {
            border-color: #7c3aed;
        }

        select option {
            background: #1e293b;
            color: #e2e8f0;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .slider-label {
            font-size: 11px;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: #1e293b;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #7c3aed;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #7c3aed;
            cursor: pointer;
            border: none;
        }

        .stats {
            background: #1a1f3a;
            padding: 10px;
            border-radius: 4px;
            font-size: 11px;
            color: #94a3b8;
            gap: 8px;
            display: flex;
            flex-direction: column;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
        }

        .stat-label {
            color: #64748b;
        }

        .stat-value {
            color: #7c3aed;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="sidebar">
        <div class="section">
            <div class="section-title">Spawn Body</div>
            <select id="spawn-type">
                <option value="random">Random</option>
                <option value="asteroid">Asteroid</option>
                <option value="planet">Planet</option>
                <option value="gas-giant">Gas Giant</option>
                <option value="star">Star</option>
                <option value="neutron-star">Neutron Star</option>
                <option value="black-hole">Black Hole</option>
                <option value="supermassive-black-hole">Supermassive BH</option>
            </select>
        </div>

        <div class="section">
            <div class="section-title">Controls</div>
            <button id="btn-play-pause">Pause</button>
            <button id="btn-clear">Clear All</button>
            <button id="btn-reset-zoom">Reset Zoom</button>
        </div>

        <div class="section">
            <div class="slider-group">
                <div class="slider-label">
                    <span>Time Speed</span>
                    <span id="speed-value">2.0x</span>
                </div>
                <input type="range" id="speed-slider" min="0.1" max="4" step="0.1" value="2">
            </div>
        </div>

        <div class="section">
            <div class="slider-group">
                <div class="slider-label">
                    <span>Gravity</span>
                    <span id="gravity-value">2.0</span>
                </div>
                <input type="range" id="gravity-slider" min="0.1" max="3" step="0.1" value="2">
            </div>
        </div>

        <div class="section">
            <div class="slider-group">
                <div class="slider-label">
                    <span>Dark Matter</span>
                    <span id="dark-matter-value">1.5</span>
                </div>
                <input type="range" id="dark-matter-slider" min="0" max="5" step="0.1" value="1.5">
            </div>
        </div>


        <div class="section">
            <div class="stats">
                <div class="stat-row">
                    <span class="stat-label">FPS:</span>
                    <span class="stat-value" id="fps">60</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Bodies:</span>
                    <span class="stat-value" id="body-count">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Total Mass:</span>
                    <span class="stat-value" id="total-mass">0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="sim.js"></script>
</body>
</html>
